name: afrl

config:

  model:
    actor:
      # List of input sources, each with name, encoder, and RMS normalization flag
      inputs:
        - name: table_cam
          encoder:
            type: drqv2
            network:
              output_dim: 256
          apply_rms: false
        - name: wrist_left_cam
          encoder:
            type: drqv2
            network:
              output_dim: 256
          apply_rms: false
        - name: wrist_right_cam
          encoder:
            type: drqv2
            network:
              output_dim: 256
          apply_rms: false
        - name: proprioception
          encoder:
            type: mlp
            network:
              units: [256]
              activation: elu
          apply_rms: true
      
      # Policy head processes concatenated encoded features
      policy_head:
        type: mlp
        network:
          units: [512, 256, 128]
          activation: elu
        fixed_std: false
        state_dependent_std: false
        log_std_init: 0.0
    
    critic:
      # List of input sources, each with name, encoder, and RMS normalization flag
      inputs:
        - name: privileged_observations
          encoder: null  # null = pass-through (no encoding)
          apply_rms: true
      # Value head processes concatenated encoded features to output scalar value
      value_head:
        type: mlp
        network:
          units: [512, 256, 128]
          activation: elu

  # Number of base environments for rollout
  num_base_envs: 48
  # Number of auxiliary environments for estimating the descent direction
  num_action_perturbations: 63
  # Number of top k perturbations to use for the ascent direction computation
  top_k_perturbations: null
  # Total number of environments = num_base_envs  * ( num_action_perturbations + 1 )
  num_envs: ${compute_num_envs:${.num_base_envs},${.num_action_perturbations}}

  max_epochs: 40000
  horizon_length: 64
  # Discount factor
  gamma: 0.99
  # TD(lambda)
  lam: 0.95
  # Whether to use causality to compute the return
  causality: True
  # Whether to use eligibility traces to compute the return
  eligibility_trace: True
  
  reward_scale: 1.0
  target_critic_alpha: 0.2

  actor_lr:  2e-3
  critic_lr: 2e-3

  # Learning rate schedules
  actor_lr_schedule:
    name: cosine  # Options: null, linear, cosine (cosine includes warmup)
    # CosineAnnealingLR with warmup parameters
    T_max: 40000
    eta_min: 1e-5
    warmup_epochs: 100  # Number of epochs for warmup (linear increase from warmup_start_lr to actor_lr)
    warmup_start_lr: 0  # Starting learning rate for warmup (default: 0.0)
  
  critic_lr_schedule:
    name: linear  # Options: null, linear, cosine
    start_factor: 1.0
    end_factor: 0.1

  bounds:
    mean_bounds: [-2, 2]
    log_std_bounds: [-5, 2]

  # entropy_parameters:
  #   initial_temperature: 1e-2
  #   actor_regularization: false
  #   soft_critic: false
  #   temperature_auto_tune: false
  #   target_std: 0.15
  #   temperature_lr: 1e-3
  
  # batch size for training the critic
  mini_batch_size: 4096
  critic_iterations: 2

  truncated_grads: True
  grad_norm: 1.0

  # Whether to use running mean and std for returns
  ret_rms: False
  normalize_delta_J: True

  save_frequency: 400
