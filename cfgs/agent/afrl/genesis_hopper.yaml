name: afrl

config:

  model:
    actor:
      # List of input sources, each with name, encoder, and RMS normalization flag
      inputs:
        - name: privileged_observations
          encoder: null  # null = pass-through (no encoding)
          apply_rms: true
      
      # Policy head processes concatenated encoded features
      policy_head:
        type: mlp
        network:
          units: [128, 64, 32]
          activation: elu
        # fixed_std true = constant log_std (use log_std_init); false = learn log_std
        fixed_std: false
        state_dependent_std: true
        log_std_init: 0.0
    
    critic:
      # List of input sources, each with name, encoder, and RMS normalization flag
      inputs:
        - name: privileged_observations
          encoder: null  # null = pass-through (no encoding)
          apply_rms: true
      # Value head processes concatenated encoded features to output scalar value
      value_head:
        type: mlp
        network:
          units: [64, 64]
          activation: elu

  # Number of base environments for rollout
  num_base_envs: 64
  # Number of auxiliary environments for estimating the descent direction
  num_action_perturbations: 63
  # Total number of environments = num_base_envs  * ( num_action_perturbations + 1 )
  num_envs: ${compute_num_envs:${.num_base_envs},${.num_action_perturbations}}

  max_epochs: 5000
  horizon_length: 32
  # Discount factor
  gamma: 0.99
  # TD(lambda)
  lam: 0.95
  # Whether to use causality to compute the return
  causality: True
  # Whether to use eligibility traces to compute the return
  eligibility_trace: True
  
  reward_scale: 1.0
  target_critic_alpha: 0.01

  actor_lr:  2e-3
  critic_lr: 2e-4
  # Adam beta
  betas: [0.7, 0.95]
  
  # Learning rate schedules
  actor_lr_schedule:
    name: cosine  # Options: null, linear, cosine (cosine includes warmup)
    # CosineAnnealingLR with warmup parameters
    T_max: 5000
    eta_min: 1e-5
    warmup_epochs: 100  # Number of epochs for warmup (linear increase from warmup_start_lr to actor_lr)
    warmup_start_lr: 0  # Starting learning rate for warmup (default: 0.0)
  
  critic_lr_schedule:
    name: null  # Options: null, linear, cosine
    # start_factor: 1.0
    # end_factor: 0.1
  
  entropy_parameters:
    initial_temperature: 1e-2
    actor_regularization: true
    soft_critic: true
    temperature_auto_tune: true
    target_std: 0.15
    temperature_lr: 1e-3

  # batch size for training the critic
  mini_batch_size: 4096
  critic_iterations: 2

  truncated_grads: True
  grad_norm: 1.0

  # Whether to use running mean and std for the observations and reward
  obs_rms: True
  ret_rms: False
  normalize_delta_J: True

  save_frequency: 400
