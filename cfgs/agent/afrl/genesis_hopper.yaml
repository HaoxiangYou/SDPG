name: afrl

config:

  network:
    actor:
      name: ActorDeterministicMLP
      mlp:
        units: [128, 64, 32]
        activation: elu
    critic:
      name: CriticMLP
      mlp:
        units: [64, 64]
        activation: elu

  # Number of base environments for rollout
  num_base_envs: 32
  # Number of auxiliary environments for estimating the descent direction
  num_action_perturbations: 31
  # Total number of environments = num_base_envs  * ( num_action_perturbations + 1 )
  num_envs: ${compute_num_envs:${.num_base_envs},${.num_action_perturbations}}

  max_epochs: 2000
  horizon_length: 32
  # Action perturbation factor
  delta: 0.1
  # Discount factor
  gamma: 0.99
  # TD(lambda)
  lam: 0.95
  reward_scale: 1.0
  target_critic_alpha: 0.2

  actor_lr:  2e-3
  critic_lr: 2e-4
  # Adam beta
  betas: [0.7, 0.95]
  # batch size for training the critic
  mini_batch_size: 1024
  critic_iterations: 16

  truncated_grads: True
  grad_norm: 1.0

  # Whether to use running mean and std for the observations and reward
  obs_rms: True
  ret_rms: True
