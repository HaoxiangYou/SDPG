# Teacher–student DAgger for Genesis Hopper (vis_obs required)
# Teacher: PPO only (trained via agents/rl_games.py). Student: same network init as AFRL (models.actor from config).
# Override task.config.vis_obs=true or use a task that enables RGB.
name: teacher_student

config:
  # Resolved for Hydra root num_envs (task.config uses it)
  num_envs: ${.student.num_envs}

  # ---------- Teacher (PPO) ----------
  # teacher_checkpoint: null → train teacher first (writes to run_dir/teacher/ with .hydra, training_logs/nn, summaries).
  # teacher_checkpoint: /path/to/folder → rl_games-style folder (training_logs/nn, .hydra, summaries); copied to run_dir/teacher/ if external.
  teacher:
    teacher_ppo_agent: ppo/genesis_hopper
    teacher_checkpoint: null
    # Merged into loaded PPO config (same structure as cfgs/agent/ppo/genesis_hopper.yaml config)
    overrides:
      rl_games:
        config:
          max_epochs: 10

  # ---------- Student (DAgger) ----------
  student:
    num_envs: 32

    # DAgger
    max_epochs: 500
    steps_per_epoch: 2048
    batch_size: 256
    learning_starts: 1
    num_update_per_epoch: 50
    supervised_loss_threshold: 1e-4
    max_replay_buffer_size: 500000
    actor_lr: 3e-4
    betas: [0.9, 0.999]
    lr_schedule: linear
    grad_norm: 1.0
    save_frequency: 50

    actor:
      inputs:
        - name: RGB
          encoder:
            type: drqv2
          network:
            output_dim: 128
          apply_rms: false
      policy_head:
        type: mlp
        network:
          units: [128, 64, 32]
          activation: elu
        fixed_std: true
        log_std_init: -1.0
