name: ppo

config:

  num_envs: 8192

  rl_games:

    algo:
      name: a2c_continuous

    model:
      name: continuous_a2c_logstd

    load_checkpoint: False
    load_path: genesis_allegro_hand_ppo.pth

    network:
      name: actor_critic
      separate: False
      space:
        continuous:
          mu_activation: None
          sigma_activation: None

          mu_init:
            name: default
          sigma_init:
            name: const_initializer
            val: 0
          fixed_sigma: True
      mlp:
        units: [1024, 512, 256, 128]
        activation: elu
        d2rl: False
        
        initializer:
          name: default
        regularizer:
          name: None

    config:
      name: genesis_allegro_hand_ppo
      env_name: afrl_env
      multi_gpu: False
      ppo: True
      mixed_precision: False
      normalize_input: True
      normalize_value: True
      reward_shaper:
        scale_value: 0.01
      normalize_advantage: True
      gamma: 0.99
      tau: 0.95
      learning_rate: 5e-4
      lr_schedule: adaptive
      kl_threshold: 0.016
      score_to_win: 100000
      max_epochs: 5000
      save_best_after: 100
      save_frequency: 200
      grad_norm: 1.0
      entropy_coef: 0.0
      truncate_grads: True
      e_clip: 0.2
      horizon_length: 16
      minibatch_size: 32768
      mini_epochs: 5
      critic_coef: 4
      clip_value: True
      seq_length: 4
      bounds_loss_coef: 0.0001

      player:
        determenistic: True
        print_stats: True
        use_vecenv: True