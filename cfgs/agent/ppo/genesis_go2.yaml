name: ppo

config:

  num_envs: 4096

  input_keys:
    actor: 
      - name: observations
    critic: 
      - name: privileged_observations

  rl_games:

    algo:
      name: a2c_continuous

    model:
      name: continuous_a2c_logstd

    load_checkpoint: False
    load_path: genesis_go2_ppo.pth

    network:
      name: actor_critic
      separate: False
      space:
        continuous:
          mu_activation: None
          sigma_activation: None

          mu_init:
            name: default
          sigma_init:
            name: const_initializer
            val: 0
          fixed_sigma: True
      mlp:
        units: [512, 256, 128]
        activation: elu
        d2rl: False
        
        initializer:
          name: default
        regularizer:
          name: None

    config:
      name: genesis_go2_ppo
      env_name: afrl_env
      multi_gpu: False
      ppo: True
      mixed_precision: False
      normalize_input: True
      normalize_value: True
      reward_shaper:
        scale_value: 1.0
      normalize_advantage: True
      value_bootstrap: True  # Bootstrap value on timeout (truncation) - critical for locomotion
      gamma: 0.99
      tau: 0.95
      learning_rate: 0.001
      lr_schedule: Adaptive  # Avoid late-training collapse (adaptive increases LR when KL drops)
      lr_threshold: 0.01
      kl_threshold: 0.01
      score_to_win: 11
      max_epochs: 2000
      save_best_after: 50
      save_frequency: 100
      grad_norm: 1.0
      entropy_coef: 0.01
      truncate_grads: True
      e_clip: 0.2
      horizon_length: 24
      minibatch_size: 24576
      mini_epochs: 5
      critic_coef: 1.0
      clip_value: True
      seq_length: 4
      bounds_loss_coef: 0.0001

      central_value_config:
        minibatch_size: 24576
        mini_epochs: 5
        learning_rate: 0.001
        clip_value: True
        normalize_input: True
        truncate_grads: True
        grad_norm: 1.0
        network:
          name: actor_critic
          central_value: True
          mlp:
            units: [512, 256, 128]
            activation: elu
            initializer:
              name: default
            regularizer:
              name: None

      player:
        determenistic: True
        print_stats: True
        use_vecenv: True