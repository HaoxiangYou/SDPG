name: sdpg

config:

  model:
    actor:
      inputs:
        - name: proprioceptive_observations
          encoder:
            type: mlp
            network:
              units: [256]
              activation: elu
          apply_rms: true
        - name: ego_centric_camera_observation
          encoder:
            type: drqv2
          apply_rms: false
      
      policy_head:
        type: mlp
        network:
          units: [256, 128]
          activation: elu
        fixed_std: false
        state_dependent_std: false
        log_std_init: 0.0
    
    critic:
      inputs:
        - name: proprioceptive_observations
          encoder:
            type: mlp
            network:
              units: [256]
              activation: elu
          apply_rms: true
        - name: height_field
          encoder: 
            type: mlp
            network:
              units: [128, 256]
              activation: elu
          apply_rms: false
      
      value_head:
        type: mlp
        network:
          units: [128]
          activation: elu

  num_base_envs: 64
  num_action_perturbations: 63
  top_k_perturbations: null
  num_envs: ${compute_num_envs:${.num_base_envs},${.num_action_perturbations}}

  max_epochs: 100000
  horizon_length: 16
  gamma: 0.99
  lam: 0.95
  causality: True
  eligibility_trace: True
  
  reward_scale: 1.0
  target_critic_alpha: 0.2

  actor_lr:  1e-3
  critic_lr: 5e-4
  
  actor_lr_schedule:
    name: cosine
    T_max: 100000
    eta_min: 1e-5
    warmup_epochs: 100
    warmup_start_lr: 0
  
  critic_lr_schedule:
    name: linear
    start_factor: 1.0
    end_factor: 0.1
  
  bounds:
    mean_bounds: [-2, 2]
    log_std_bounds: [-5, 2]

  entropy_parameters:
    initial_temperature: 1e-2
    actor_regularization: true
    soft_critic: False
    temperature_auto_tune: true
    target_std: 0.15
    temperature_lr: 1e-3

  mini_batch_size: 4096
  critic_iterations: 2

  truncated_grads: True
  grad_norm: 1.0

  ret_rms: False
  normalize_delta_J: True

  save_frequency: 400
