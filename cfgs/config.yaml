# Set default task and training config
defaults:
  - task: genesis/hopper
  - agent: afrl/genesis_hopper
  - _self_

# Logging
hydra:
  run:
    dir: logs/${task.backend}/${task.name}/${agent.name}/${now:%Y-%m-%d_%H-%M-%S}

# Wandb configuration
wandb:
  enabled: False  # Set to True to enable wandb logging
  project: afrl  # Wandb project name
  entity: null  # Wandb entity/username (null for default)
  name: null  # Run name (null for auto-generated name)
  tags: []  # List of tags for the run
  notes: null  # Notes about the run
  log_config: True  # Whether to log the config to wandb

# General
seed: 0
device: cuda

train: False # Whether to train the agent or eval the trained agent
checkpoint: 'logs/genesis/go2/ppo/2026-01-28_13-21-02/training_logs/nn/last_genesis_go2_ppo_ep_7600_rew_1104.0654.pth' # Path to the checkpoint for play or resume training

num_envs: ${agent.config.num_envs}
