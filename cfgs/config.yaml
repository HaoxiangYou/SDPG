# Set default task and training config
defaults:
  - task: genesis/hopper
  - agent: afrl/genesis_hopper
  - _self_

# Logging
hydra:
  run:
    dir: logs/${task.backend}/${task.name}/${agent.name}/${train_or_eval:${train}}/${run_name_or_timestamp:${run_name},${now:%Y-%m-%d_%H-%M-%S}}
  sweep:
    dir: logs/${task.backend}/${task.name}/${agent.name}/${train_or_eval:${train}}/${run_name_or_timestamp:${run_name},${now:%Y-%m-%d_%H-%M-%S}}

# Wandb configuration
wandb:
  enable: False  # Set to True to enable Weights & Biases logging
  project: afrl  # Wandb project name
  entity: null  # Wandb entity/username (null for default)
  group: null  # Group runs (same config, different seeds) for easy averaging/comparison
  job_type: null  # Optional (e.g., train/eval/sweep)
  name: null  # Run name (null for auto-generated name)
  tags: []  # List of tags for the run
  notes: null  # Notes about the run
  log_config: True  # Whether to log the config to wandb

# General
seed: 0
device: cuda
run_name: null  # Optional override for the final log directory name and WandB run name

train: True # Whether to train the agent or eval the trained agent
checkpoint: "" # Path to the checkpoint for play or resume training

num_envs: ${agent.config.num_envs}
