# Set default task and training config
defaults:
  - task: genesis/hopper
  - agent: afrl/genesis_hopper
  - _self_

# Logging
hydra:
  run:
    dir: logs/${task.backend}/${task.name}/${agent.name}/${now:%Y-%m-%d_%H-%M-%S}

# General
seed: 0
device: cuda

train: True # Whether to train the agent or eval the trained agent
checkpoint: '' # Path to the checkpoint for play or resume training

num_envs: ${agent.config.num_envs}
