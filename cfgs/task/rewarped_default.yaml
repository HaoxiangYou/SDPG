# backend simulator
backend: rewarped
env:
  # subfolder for the task, for mujoco control tasks, rewarped put it under dflex folder
  env_suite: dflex
  env_name: ant
  num_envs: ${...num_envs}

  randomize: True
  no_grad: True
  render: True
  
  # rewarped backend specific terms
  no_env_offset: False
  render_mode: "usd"
  # render_output_dir: null  # If null, uses Hydra's output directory. Otherwise, specify a path for USD files.