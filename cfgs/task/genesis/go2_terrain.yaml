backend: genesis

name: go2_terrain

config:
  num_envs: ${...num_envs}

  nominal_env_ids: null
  
  randomize_init: True
  sim_options:
    dt: 0.02
    substeps: 4
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: null
  
  vis_obs: False
  sensors_args:
    camera:
      res: [84, 84]
      pos: [0.2, 0.0, -0.1]
      lookat: [0.8, 0.0, -0.3]
      fov: 80.0
      lights:
        pos: [8.0, 0.0, 2.0]
        intensity: 0.8
        color: [1.0, 1.0, 1.0]
        dir: [0.0, 0.0, -1.0]
        cutoff: 100
        directional: true
        castshadow: false

  terrain_args:
      mesh_type: "heightfield"
      curriculum: False
      selected: False
      obtain_terrain_info_around_feet: True
      measure_heights: True
      measured_points_x: [-0.4, -0.3, -0.2, -0.1, 0., 0.1, 0.2, 0.3, 0.4] # 9x9=81
      measured_points_y: [-0.4, -0.3, -0.2, -0.1, 0., 0.1, 0.2, 0.3, 0.4]
      border_size: 20.0 
      border_height: 1.0 
      terrain_length: 8.0 
      terrain_width: 8.0 
      platform_size: 4.0 
      num_rows: 10 # number of terrain rows (levels)
      num_cols: 10 # number of terrain cols (types)
      num_subterrains: 100 
      horizontal_scale: 0.1 # [m] distance between height samples in x and y direction
      vertical_scale: 0.005 # [m] distance between height samples in z direction
      static_friction: 1.0 # coefficient of static friction of the terrain
      dynamic_friction: 1.0 # coefficient of dynamic friction of the terrain
      restitution: 0.0 # coefficient of restitution of the terrain
      max_init_terrain_level: 1 # starting curriculum level
      # terrain types: [smooth slope, rough slope, stairs up, stairs down, hurtle, stepping stones, gap, pit]
      terrain_proportions: [0.2, 0.1, 0.25, 0.25, 0.2]

  show_viewer: False
  show_FPS: False
  domain_rand_options: 
    randomize_friction: True
    friction_range: [0.2, 1.5]
    randomize_base_mass: True
    added_mass_range: [-1.0, 3.0]
    push_robot: True
    push_interval_s: 10
    max_push_vel_xy: 1.0
    randomize_com_displacement: True
    com_displacement_range: [-0.01, 0.01]
    randomize_motor_strength: False
    motor_strength_range: [0.9, 1.1]
    randomize_motor_offset: True
    motor_offset_range: [-0.02, 0.02]
    randomize_kp_scale: True
    kp_scale_range: [0.8, 1.2]
    randomize_kd_scale: True
    kd_scale_range: [0.8, 1.2]
    obtain_terrain_info_around_feet: True
    obtain_link_contact_states: True
    contact_state_link_names: ["thigh", "calf", "foot", "base", "hip"]
    penalize_contacts_on: ["thigh", "calf", "base", "head", "hip"]

play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True