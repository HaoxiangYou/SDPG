backend: genesis

name: walker

config:
  num_envs: ${...num_envs}
  # which envs are treated as the nominal environments (for AFRL agent),
  # if None, all envs are treated as nominal environments
  nominal_env_ids: null
  
  randomize_init: True
  sim_options:
    dt: 1e-2
    substeps: 1
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: null

  # state or rgb based observation
  vis_obs: False
  sensors_args: null
      
  show_viewer: False
  show_FPS: False


play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True