backend: genesis

name: shadow_hand

config:
  num_envs: ${...num_envs}
  # which envs are treated as the nominal environments (for AFRL agent),
  # if None, all envs are treated as nominal environments
  nominal_env_ids: null

  randomize_init: True
  # IsaacLab ShadowHandEnvCfg uses sim.dt=1/120 with decimation=2, i.e. a
  # 60 Hz policy decision rate over 120 Hz physics. Genesis's `dt` is the
  # outer (policy) step time and `substeps` are physics substeps per step.
  sim_options:
    dt: 1.6667e-2
    substeps: 2
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: [0]

  vis_obs: False
  sensors_args:
    camera:
      res: [84, 84]
      pos: [0.40, 0.05, 0.55]
      lookat: [0.0, 0.1, 0.40]
      fov: 80.0
      lights:
        pos: [0.0, 0.0, 2.0]
        intensity: 0.8
        color: [1.0, 1.0, 1.0]
        dir: [0.0, 0.0, -1.0]
        cutoff: 100
        directional: True
        castshadow: False

  show_viewer: False
  show_FPS: False


play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True
