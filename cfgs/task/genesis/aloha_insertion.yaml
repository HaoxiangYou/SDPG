backend: genesis

name: aloha_insertion

config:
  num_envs: ${...num_envs}
  # which envs are treated as the nominal environments (for AFRL agent),
  # if None, all envs are treated as nominal environments
  nominal_env_ids: null
  
  randomize_init: True
  sim_options:
    dt: 0.01
    substeps: 4
  rigid_options:
    noslip_iterations: 5
    max_collision_pairs: 16
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: null

  vis_obs: False
  sensors_args: null

  show_viewer: False
  show_FPS: False


play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True