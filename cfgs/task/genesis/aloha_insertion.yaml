backend: genesis

name: aloha_insertion

config:
  num_envs: ${...num_envs}
  # which envs are treated as the nominal environments (for SDPG agent),
  # if None, all envs are treated as nominal environments
  nominal_env_ids: null
  
  randomize_init: True
  sim_options:
    dt: 0.01
    substeps: 4
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: null

  vis_obs: False
  sensors_args:
    camera:
      # Shared across all batch-renderer cameras. `res` MUST be the same for
      # every camera (Madrona batch-renderer constraint, see batch_renderer.py:302).
      type: rgb
      res: [64, 64]
      lights:
        pos: [0.0, 0.0, 0.0]
        dir: [0.0, 0.0, -1.0]
        intensity: 0.8
        color: [1.0, 1.0, 1.0]
        cutoff: 100
        directional: True
        castshadow: False
      # Per-camera overrides. Each entry specifies its own pose/FOV/near/far.
      cameras:
        table_cam:
          pos: [0.0, 0.0, 0.0]
          lookat: [0.0, 0.0, -1.0]
          fov: 80.0
          near: 0.01
          far: 5.0
        wrist_left_cam:
          pos: [0.02540, 0.0, 0.08247]
          lookat: [0.93171, 0.0, -0.34014]
          fov: 60.0
          near: 0.01
          far: 5.0
        wrist_right_cam:
          pos: [0.02540, 0.0, 0.08247]
          lookat: [0.93171, 0.0, -0.34014]
          fov: 60.0
          near: 0.01
          far: 5.0

  show_viewer: False
  show_FPS: False


play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True