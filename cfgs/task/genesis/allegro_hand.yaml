backend: genesis

name: allegro_hand

config:
  num_envs: ${...num_envs}
  # which envs are treated as the nominal environments (for AFRL agent),
  # if None, all envs are treated as nominal environments
  nominal_env_ids: null
  
  randomize_init: True

  # Goal orientation on reset (when randomize_init): single rotation about world +Y (pitch) or +X (roll),
  # angle uniform in [angle_deg_min, angle_deg_max]. Cube stays at default orientation; policy infers axis from state.
  init_goal_rotation:
    enable: true
    angle_deg_min: 60.0
    angle_deg_max: 90.0

  sim_options:
    dt: 3e-2
    substeps: 4
  viewer_options:
    max_FPS: 60
  vis_options:
    rendered_envs_idx: null

  vis_obs: False
  sensors_args:
    camera:
      res: [84, 84]
      pos: [0.40, 0.05, 0.425]
      lookat: [0.25, -0.10, 0.275]
      fov: 80.0
      lights:
        pos: [0.0, 0.0, 2.0]
        intensity: 0.8
        color: [1.0, 1.0, 1.0]
        dir: [0.0, 0.0, -1.0]
        cutoff: 100
        directional: True
        castshadow: False

  show_viewer: False
  show_FPS: False


play:
  num_envs: 64
  randomize_init: True
  show_viewer: True
  show_FPS: True