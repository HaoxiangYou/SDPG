defaults:
  - task: genesis/hopper
  - _self_

device: cuda

# Number of envs to replay. If null, defaults to the trajectory's batch size
# (and is always capped at it). Set this to an int to replay only the first
# N trajectories.
num_envs: null

traj_path: null  # Path to the .pt trajectory file (required)
max_frames: null  # Cap the number of timesteps to replay (optional)
